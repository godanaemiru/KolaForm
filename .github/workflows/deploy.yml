name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC federation: GitHub mints a short-lived token, Azure trusts it.
# The only "secrets" are three non-sensitive identifiers.
permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-state
  cancel-in-progress: false

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_IN_AUTOMATION: "true"
  STATE_RG: kolaform-tfstate-rg

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # State account name is derived from the subscription id, so forks
      # need no extra configuration — bootstrap.sh uses the same formula.
      - name: Derive state backend name
        id: backend
        run: |
          SUFFIX=$(echo -n "$ARM_SUBSCRIPTION_ID" | sha256sum | cut -c1-10)
          echo "sa=tfstate$SUFFIX" >> "$GITHUB_OUTPUT"

      # The data storage account denies all traffic except the compute
      # subnet. Terraform on this runner still has to manage the blob
      # container, so admit this runner's IP for the duration of the job.
      # No-op on the first run, before the account exists.
      - name: Open storage firewall for runner
        run: |
          DATA_SA=$(az storage account list \
            --query "[?tags.project=='kolaform' && tags.role=='data'].name | [0]" -o tsv)
          if [ -n "$DATA_SA" ] && [ "$DATA_SA" != "None" ]; then
            RUNNER_IP=$(curl -fsS https://api.ipify.org)
            az storage account network-rule add \
              --account-name "$DATA_SA" --ip-address "$RUNNER_IP" --output none
            echo "DATA_SA=$DATA_SA" >> "$GITHUB_ENV"
            echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
            sleep 30
          else
            echo "Data storage account not created yet - skipping."
          fi

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=$STATE_RG" \
            -backend-config="storage_account_name=${{ steps.backend.outputs.sa }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=kolaform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Close storage firewall
        if: always()
        run: |
          if [ -n "${DATA_SA:-}" ] && [ -n "${RUNNER_IP:-}" ]; then
            az storage account network-rule remove \
              --account-name "$DATA_SA" --ip-address "$RUNNER_IP" --output none || true
          fi
